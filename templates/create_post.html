{% extends "base.html" %}

{% block title %}Create Post - Nyapi{% endblock %}

{% block content %}
<div class="create-post-container">
    <div class="create-post-card">
        <h2>Create New Post</h2>
        <br>
        <form method="POST" action="{{ url_for('create_post') }}" enctype="multipart/form-data" class="post-form">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>
            
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" rows="6" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="media">Media (Image, Video, Audio or ZIP)</label>
                <input type="file" id="media" name="media" accept="image/*,video/*,audio/mpeg,.zip">
                <small>Supported formats: PNG, JPG, GIF, MP4, WEBM, MP3, ZIP</small>
            </div>
            
            <div class="form-group">
                <label for="scratch_url">Scratch Project Link (optional)</label>
                <input type="url" id="scratch_url" name="scratch_url" 
                       placeholder="https://scratch.mit.edu/projects/123456789/">
                <small>Enter a valid Scratch project URL to embed it in your post</small>
            </div>
            
            
            <div class="cf-turnstile" data-sitekey="{{ config['TURNSTILE_SITE_KEY'] }}"></div>
            
            <div class="form-actions">
                <button type="submit" class="submit-btn">Create Post</button>
                <a href="{{ url_for('index') }}" class="cancel-btn">Cancel</a>
            </div>
        </form>
    </div>
</div>


<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: #fff;
}

.form-group input[type="text"],
.form-group input[type="url"],
.form-group textarea {
    width: 100%;
    padding: 0.75rem;
    background: #2c2233;
    border: 1px solid #4a3c5a;
    border-radius: 8px;
    color: #fff;
    font-size: 1rem;
}

.form-group input[type="file"] {
    width: 100%;
    padding: 0.5rem;
    background: #2c2233;
    border: 1px solid #4a3c5a;
    border-radius: 8px;
    color: #fff;
}

.form-group small {
    display: block;
    margin-top: 0.25rem;
    color: #aaa;
    font-size: 0.85rem;
}
</style>
{% endblock %}
